<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>历史趋势 - {{ server_name }}</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        width: 100%;
        min-height: 100vh;
        background: #0a0a0a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        color: #e8edf5;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 30px;
    }
    .container {
        width: 760px;
        max-width: 100%;
        background: #111111;
        border-radius: 32px;
        padding: 32px 36px 26px;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .header-top {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 16px;
    }
    .logo {
        height: 40px;
        width: auto;
        display: block;
    }
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 10px;
    }
    .header h1 {
        font-size: 22px;
        font-weight: 700;
        background: linear-gradient(135deg, #ffffff 60%, #8888cc 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .period-badge {
        background: rgba(255,255,255,0.05);
        padding: 4px 16px;
        border-radius: 40px;
        font-size: 14px;
        color: #6a7a9a;
        border: 1px solid rgba(255,255,255,0.05);
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        background: rgba(255,255,255,0.02);
        border-radius: 16px;
        padding: 16px 20px;
        border: 1px solid rgba(255,255,255,0.05);
        margin-bottom: 24px;
    }
    .stats-grid .item .label { font-size: 12px; color: #6a7a9a; text-transform: uppercase; letter-spacing: 0.5px; }
    .stats-grid .item .value { font-size: 20px; font-weight: 700; }
    .stats-grid .item .value.green { color: #4ade80; }
    .stats-grid .item .value.yellow { color: #fbbf24; }
    .stats-grid .item .value.red { color: #f87171; }
    .stats-grid .item .value.blue { color: #60a5fa; }

    .chart-container {
        background: rgba(255,255,255,0.02);
        border-radius: 16px;
        padding: 20px 24px 16px;
        border: 1px solid rgba(255,255,255,0.05);
        position: relative;
    }
    .chart-svg {
        width: 100%;
        height: 200px;
        display: block;
    }
    .chart-labels {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: #4a5a7a;
        margin-top: 6px;
        padding: 0 4px;
    }

    .footer {
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        justify-content: flex-end;
        font-size: 13px;
        color: #4a5a7a;
        gap: 12px;
    }
    .footer .brand { color: #6a7a9a; }
    @media (max-width: 600px) {
        .stats-grid { grid-template-columns: 1fr 1fr; }
    }
</style>
</head>
<body>
<div class="container">
    <div class="header-top">
        <img class="logo" src="https://raw.githubusercontent.com/thTag/astrbot_plugin_nezhatz/c17f37c9147ca93487b2fe13e3e58960d0dcd91e/logo.png" alt="哪吒监控" />
    </div>
    <div class="header">
        <h1>📈 {{ server_name }} - {{ metric_name }}</h1>
        <span class="period-badge">{{ period_label }}</span>
    </div>

    <div class="stats-grid">
        <div class="item"><div class="label">当前</div><div class="value blue">{{ current_value }}</div></div>
        <div class="item"><div class="label">最高</div><div class="value red">{{ max_value }} <span style="font-size:12px;color:#4a5a7a;font-weight:400;">({{ max_time }})</span></div></div>
        <div class="item"><div class="label">最低</div><div class="value green">{{ min_value }} <span style="font-size:12px;color:#4a5a7a;font-weight:400;">({{ min_time }})</span></div></div>
        <div class="item"><div class="label">平均</div><div class="value yellow">{{ avg_value }}</div></div>
    </div>

    <div class="chart-container">
        <svg class="chart-svg" viewBox="0 0 700 200" preserveAspectRatio="xMidYMid meet">
            <!-- 网格线 -->
            <line x1="40" y1="30" x2="680" y2="30" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
            <line x1="40" y1="72" x2="680" y2="72" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
            <line x1="40" y1="115" x2="680" y2="115" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
            <line x1="40" y1="157" x2="680" y2="157" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

            <!-- Y轴标签 -->
            <text x="35" y="34" font-size="10" fill="#4a5a7a" text-anchor="end">100%</text>
            <text x="35" y="76" font-size="10" fill="#4a5a7a" text-anchor="end">75%</text>
            <text x="35" y="119" font-size="10" fill="#4a5a7a" text-anchor="end">50%</text>
            <text x="35" y="161" font-size="10" fill="#4a5a7a" text-anchor="end">25%</text>
            <text x="35" y="185" font-size="10" fill="#4a5a7a" text-anchor="end">0%</text>

            <!-- 面积填充 -->
            <polygon points="40,175 {{ points }} 680,175" fill="url(#areaGrad)" opacity="0.3"/>

            <!-- 折线 -->
            <polyline points="{{ points }}" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

            <defs>
                <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.6"/>
                    <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.0"/>
                </linearGradient>
            </defs>
        </svg>
        <div class="chart-labels">
            <span>{{ start_time }}</span>
            <span>{{ mid_time }}</span>
            <span>{{ end_time }}</span>
        </div>
    </div>

    <div class="footer">
        <span class="brand">⚡ 哪吒探针</span>
        <span>·</span>
        <span>更新于 {{ update_time }}</span>
    </div>
</div>
</body>
</html>
