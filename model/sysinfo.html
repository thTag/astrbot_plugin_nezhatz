<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: #0f1117;
        padding: 30px;
        color: #e4e6eb;
        width: 700px;
    }
    .container {
        background: #1a1d27;
        border-radius: 16px;
        padding: 28px 30px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #2a2d3a;
        padding-bottom: 16px;
        margin-bottom: 20px;
    }
    .header h1 {
        font-size: 24px;
        font-weight: 700;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    .stats {
        display: flex;
        gap: 20px;
        font-size: 14px;
    }
    .stats span {
        background: #252a38;
        padding: 4px 14px;
        border-radius: 20px;
        color: #b0b8c8;
    }
    .stats .online { color: #4ade80; }
    .stats .offline { color: #f87171; }
    .server-grid {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .server-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #222733;
        padding: 12px 18px;
        border-radius: 10px;
        transition: all 0.2s;
        border-left: 4px solid #4ade80;
    }
    .server-item.offline {
        border-left-color: #f87171;
        opacity: 0.7;
    }
    .server-info {
        display: flex;
        align-items: center;
        gap: 12px;
    }
    .server-info .flag {
        font-size: 20px;
    }
    .server-info .name {
        font-weight: 600;
        font-size: 16px;
        color: #e4e6eb;
    }
    .server-info .status-badge {
        font-size: 12px;
        padding: 2px 10px;
        border-radius: 12px;
        background: #1a3a2a;
        color: #4ade80;
    }
    .server-info .status-badge.offline {
        background: #3a1a1a;
        color: #f87171;
    }
    .server-resources {
        display: flex;
        gap: 20px;
        font-size: 13px;
        color: #9aa2b8;
    }
    .server-resources span {
        display: flex;
        align-items: center;
        gap: 4px;
    }
    .server-resources .cpu-bar, .server-resources .mem-bar {
        display: inline-block;
        width: 60px;
        height: 6px;
        background: #2a2d3a;
        border-radius: 4px;
        overflow: hidden;
        margin-left: 4px;
    }
    .server-resources .cpu-bar .fill, .server-resources .mem-bar .fill {
        height: 100%;
        border-radius: 4px;
        background: linear-gradient(90deg, #4ade80, #22d3ee);
    }
    .footer {
        margin-top: 16px;
        padding-top: 14px;
        border-top: 1px solid #2a2d3a;
        font-size: 12px;
        color: #6b7280;
        text-align: right;
    }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📊 服务器状态</h1>
        <div class="stats">
            <span>总计: {{ total }}</span>
            <span class="online">🟢 {{ online }}</span>
            <span class="offline">🔴 {{ offline }}</span>
        </div>
    </div>
    <div class="server-grid">
        {% for server in servers %}
        <div class="server-item {{ 'offline' if not server.online else '' }}">
            <div class="server-info">
                <span class="flag">{{ server.flag }}</span>
                <span class="name">{{ server.name }}</span>
                <span class="status-badge {{ 'offline' if not server.online else '' }}">
                    {{ '在线' if server.online else '离线' }}
                </span>
            </div>
            <div class="server-resources">
                <span>
                    💻 {{ "%.1f"|format(server.cpu) }}%
                    <span class="cpu-bar"><span class="fill" style="width: {{ "%.0f"|format(server.cpu) }}%;"></span></span>
                </span>
                <span>
                    🧠 {{ "%.1f"|format(server.mem) }}%
                    <span class="mem-bar"><span class="fill" style="width: {{ "%.0f"|format(server.mem) }}%;"></span></span>
                </span>
            </div>
        </div>
        {% endfor %}
    </div>
    <div class="footer">
        哪吒探针 · 更新于 {{ update_time }}
    </div>
</div>
</body>
</html>
