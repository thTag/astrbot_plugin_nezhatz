<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>服务监控列表</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        width: 100%;
        min-height: 100vh;
        background: #0a0a0a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        color: #e8edf5;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 30px;
    }
    .container {
        width: 700px;
        max-width: 100%;
        background: #111111;
        border-radius: 32px;
        padding: 32px 36px 26px;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .header-top {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
    }
    .logo {
        height: 40px;
        width: auto;
        display: block;
    }
    .header-top .title {
        font-size: 20px;
        font-weight: 700;
        background: linear-gradient(135deg, #ffffff 60%, #8888cc 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        flex-wrap: wrap;
        gap: 12px;
    }
    .header h1 {
        font-size: 26px;
        font-weight: 700;
        background: linear-gradient(135deg, #ffffff 60%, #8888cc 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .stats {
        display: flex;
        gap: 16px;
    }
    .stat-item {
        background: rgba(255, 255, 255, 0.05);
        padding: 6px 16px;
        border-radius: 40px;
        font-size: 14px;
        font-weight: 500;
        color: #b0c4e0;
        border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .stat-item .num { font-weight: 700; color: #f0f4ff; }

    .service-grid {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 4px;
    }
    .service-card {
        background: rgba(255, 255, 255, 0.025);
        border-radius: 16px;
        padding: 14px 22px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px 16px;
    }
    .service-card.offline { opacity: 0.6; border-color: rgba(255, 100, 100, 0.1); }
    .service-info { display: flex; align-items: center; gap: 12px; }
    .service-name { font-size: 18px; font-weight: 600; color: #f0f6ff; }
    .service-id { font-size: 13px; color: #4a5a7a; background: rgba(255,255,255,0.05); padding: 2px 10px; border-radius: 20px; }

    .service-stats {
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
    }
    .stat-label { font-size: 14px; color: #6a7a9a; }
    .stat-value { font-weight: 600; font-size: 15px; }

    .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 14px 4px 10px;
        border-radius: 40px;
        font-size: 14px;
        font-weight: 600;
    }
    .status-badge.online { background: rgba(74, 222, 128, 0.12); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.1); }
    .status-badge.offline { background: rgba(248, 113, 113, 0.08); color: #f87171; border: 1px solid rgba(248, 113, 113, 0.1); }
    .status-badge.unknown { background: rgba(255, 255, 255, 0.05); color: #6a7a9a; border: 1px solid rgba(255, 255, 255, 0.05); }
    .status-dot {
        width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    }
    .status-dot.online { background: #4ade80; }
    .status-dot.offline { background: #f87171; }
    .status-dot.unknown { background: #6a7a9a; }

    .progress-track {
        width: 80px; height: 6px; background: rgba(255,255,255,0.06); border-radius: 10px; overflow: hidden; display: inline-block; vertical-align: middle;
    }
    .progress-track .bar { height: 100%; border-radius: 10px; }
    .bar.green { background: linear-gradient(90deg, #4ade80, #22d3ee); }
    .bar.yellow { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
    .bar.red { background: linear-gradient(90deg, #f87171, #ef4444); }

    .footer {
        margin-top: 22px;
        padding-top: 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        justify-content: flex-end;
        font-size: 13px;
        color: #4a5a7a;
        gap: 12px;
    }
    .footer .brand { color: #6a7a9a; }
    @media (max-width: 600px) {
        .service-card { flex-direction: column; align-items: stretch; }
        .service-stats { justify-content: space-between; }
    }
</style>
</head>
<body>
<div class="container">
    <div class="header-top">
        <img class="logo" src="https://raw.githubusercontent.com/thTag/astrbot_plugin_nezhatz/c17f37c9147ca93487b2fe13e3e58960d0dcd91e/logo.png" alt="哪吒监控" />
        <span class="title">哪吒监控</span>
    </div>
    <div class="header">
        <h1>📊 服务监控</h1>
        <div class="stats">
            <span class="stat-item">总计 <span class="num">{{ total }}</span></span>
            <span class="stat-item">🟢 在线 <span class="num">{{ online }}</span></span>
            <span class="stat-item">🔴 离线 <span class="num">{{ offline }}</span></span>
        </div>
    </div>

    <div class="service-grid">
        {% for svc in services %}
        <div class="service-card {% if svc.status == '连接异常' %}offline{% endif %}">
            <div class="service-info">
                <span class="service-name">{{ svc.name }}</span>
                <span class="service-id">ID: {{ svc.id }}</span>
            </div>
            <div class="service-stats">
                <span>
                    <span class="stat-label">可用率</span>
                    <span class="stat-value">{{ '%.2f'|format(svc.up_percent) }}%</span>
                    <span class="progress-track"><div class="bar {% if svc.up_percent >= 95 %}green{% elif svc.up_percent >= 80 %}yellow{% else %}red{% endif %}" style="width: {{ svc.up_percent if svc.up_percent <= 100 else 100 }}%;"></div></span>
                </span>
                <span>
                    <span class="stat-label">延迟</span>
                    <span class="stat-value">{{ svc.avg_delay if svc.avg_delay != 'N/A' else 'N/A' }}</span>
                </span>
                <span class="status-badge {{ svc.status_class }}">
                    <span class="status-dot {{ svc.status_class }}"></span>
                    {{ svc.status }}
                </span>
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="footer">
        <span class="brand">⚡ 哪吒探针</span>
        <span>·</span>
        <span>更新于 {{ update_time }}</span>
    </div>
</div>
</body>
</html>
